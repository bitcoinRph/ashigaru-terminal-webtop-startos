name: Release

# Builds the .s9pk and publishes it as a GitHub Release so it can be downloaded
# and sideloaded onto StartOS. Runs automatically on every push to main, and on
# demand via "Run workflow". The release tag is derived from the package version
# in startos/versions/current.ts (e.g. 1.0.0:0 -> v1.0.0_0); pushing a version
# bump therefore cuts a new release automatically.

on:
  workflow_dispatch:
  push:
    branches: ['main']
    paths-ignore: ['*.md']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Setup build environment
        uses: start9labs/shared-workflows/.github/actions/setup-build-env@master

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find or create developer signing key
        run: |
          if [ -n "${{ secrets.DEV_KEY }}" ]; then
            mkdir -p ~/.startos
            printf '%s' "${{ secrets.DEV_KEY }}" > ~/.startos/developer.key.pem
          else
            start-cli init-key
          fi
        shell: bash

      - name: Build the service package
        run: |
          RUST_BACKTRACE=1 make
          echo "SHA256SUMs:"
          sha256sum *.s9pk
        shell: bash

      - name: Determine version and tag
        id: ver
        run: |
          VERSION=$(grep -oP "version:\s*['\"]\K[^'\"]+" startos/versions/current.ts)
          if [ -z "$VERSION" ]; then echo "::error::could not read version"; exit 1; fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION//:/_}" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Ashigaru Terminal ${{ steps.ver.outputs.version }}
          files: '*.s9pk'
          fail_on_unmatched_files: true
          generate_release_notes: true

name: Build

# PR / on-demand validation build that uploads the .s9pk as a 14-day artifact.
# Pushes to main are handled by the Release workflow (which publishes a GitHub
# Release), so this does not trigger on push to avoid double builds.
on:
  workflow_dispatch:
  pull_request:
    paths-ignore: ['*.md']
    branches: ['main']

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # Only the draft check should gate PR builds; always build on push/dispatch.
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    uses: start9labs/shared-workflows/.github/workflows/build.yml@master
    # with:
    #   FREE_DISK_SPACE: true
    secrets:
      DEV_KEY: ${{ secrets.DEV_KEY }}
